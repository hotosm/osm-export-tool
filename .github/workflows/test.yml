name: Test

on:
  push:
    branches:
      - login_hanko
  pull_request:
    branches:
      - login_hanko

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose -f compose.test.yaml up -d --build

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec hotosm-export-tool-app python manage.py check && break
            echo "Waiting for app... ($i/30)"
            sleep 5
          done

      - name: Run tests
        run: make test_all

      - name: Stop services
        if: always()
        run: docker compose -f compose.test.yaml down
