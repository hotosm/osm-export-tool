# compose.login-hanko.yaml - Test environment for login_hanko branch
# Deploy to: testlogin.export.hotosm.org
# Requires: Traefik running in /opt/traefik with hotosm-test network

services:
  app:
    image: ghcr.io/hotosm/osm-export-tool/app:login-hanko
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgis://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEBUG=False
      - DJANGO_ENV=production
      - DJANGO_SETTINGS_MODULE=core.settings.project
      - HOSTNAME=testlogin.export.hotosm.org
      - ALLOWED_HOSTS=testlogin.export.hotosm.org,localhost,app,nginx
      - CSRF_TRUSTED_ORIGINS=https://testlogin.export.hotosm.org,https://dev.login.hotosm.org
      - USE_X_FORWARDED_HOST=true
      - SECRET_KEY=${SECRET_KEY}
      # Redis for Dramatiq
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Email disabled for test
      - EMAIL_HOST=
      # Overpass API
      - OVERPASS_API_URL=https://overpass-api.de/api/
      - RAW_DATA_API_URL=https://api-stage.raw-data.hotosm.org/
      # HDX (disabled for test)
      - HDX_API_KEY=disabled
      - HDX_SITE=demo
      - SYNC_TO_HDX=false
      # Hanko SSO Authentication
      - AUTH_PROVIDER=${AUTH_PROVIDER:-hanko}
      - HANKO_API_URL=https://dev.login.hotosm.org
      - HANKO_PUBLIC_URL=https://dev.login.hotosm.org
      - JWT_ISSUER=https://dev.login.hotosm.org
      - COOKIE_SECRET=${COOKIE_SECRET}
      - COOKIE_DOMAIN=.hotosm.org
      - COOKIE_SECURE=true
      - LOGIN_URL=https://dev.login.hotosm.org
      - ADMIN_EMAILS=hernangigena@gmail.com,justina@animus.com.ar,andreatchirillano@hotmail.com,emilio.mariscal@hotosm.org
    command: >
      sh -c "
        python3 manage.py migrate --noinput &&
        python3 manage.py collectstatic --noinput &&
        gunicorn --bind 0.0.0.0:8000 --workers 2 core.wsgi:application
      "
    volumes:
      - static-files:/app/static
      - export-downloads:/app/export_downloads
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static-files:/app/static:ro
      - export-downloads:/app/export_downloads:ro
    networks:
      - hotosm-test
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.export-tool.rule=Host(`testlogin.export.hotosm.org`)"
      - "traefik.http.routers.export-tool.entrypoints=websecure"
      - "traefik.http.routers.export-tool.tls.certresolver=letsencrypt"
      - "traefik.http.services.export-tool.loadbalancer.server.port=80"

  worker:
    image: ghcr.io/hotosm/osm-export-tool/app:login-hanko
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgis://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEBUG=True
      - DJANGO_ENV=production
      - DJANGO_SETTINGS_MODULE=core.settings.project
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OVERPASS_API_URL=https://overpass-api.de/api/
      - RAW_DATA_API_URL=https://api-stage.raw-data.hotosm.org/
      - HDX_API_KEY=disabled
      - HDX_SITE=demo
      - SYNC_TO_HDX=false
    command: python3 -m dramatiq tasks.task_runners -p 1
    networks:
      - internal

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - export-tool-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  hotosm-test:
    external: true
  internal:

volumes:
  export-tool-db:
  static-files:
  export-downloads:
